<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1016" />
  <title>카프사건사고게시판</title>
  <style>
    :root {
      --bg: #090b10;
      --panel: rgba(18, 21, 28, .92);
      --line: rgba(255,255,255,.09);
      --text: #f7f8fb;
      --muted: #9ca3af;
      --accent: #7c5cff;
      --accent2: #ff4f8b;
      --shadow: 0 24px 80px rgba(0,0,0,.44);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      color: var(--text);
      font-family: Pretendard, "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 14% 0%, rgba(124,92,255,.18), transparent 32%),
        radial-gradient(circle at 88% 9%, rgba(255,79,139,.13), transparent 28%),
        linear-gradient(180deg, #11141b 0%, var(--bg) 100%);
    }

    button { font: inherit; }

    .page {
      width: min(720px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 60px;
    }

    .board {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: 70px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      background: rgba(14,17,23,.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      letter-spacing: -.03em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 11px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 10px 24px rgba(124,92,255,.28);
    }

    .board-status {
      font-size: 12px;
      color: var(--muted);
    }

    .feed {
      padding: 22px 14px 38px;
    }

    .loading, .empty, .error {
      min-height: 520px;
      display: grid;
      place-items: center;
      padding: 30px;
      text-align: center;
      color: var(--muted);
    }

    .loading-orb {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(124,92,255,.22), rgba(255,79,139,.13));
      animation: pulse 1.2s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      to { transform: translateY(-6px) rotate(4deg); filter: brightness(1.15); }
    }

    .post {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(17,20,27,.98);
      box-shadow: 0 18px 50px rgba(0,0,0,.3);
      transform-origin: center top;
    }

    .post + .post { margin-top: 20px; }

    .post.enter {
      animation: postEnter .78s cubic-bezier(.18,.9,.24,1.08) both;
    }

    @keyframes postEnter {
      0% { opacity: 0; transform: translateY(-34px) scale(.93); filter: blur(10px); }
      65% { opacity: 1; transform: translateY(6px) scale(1.01); filter: blur(0); }
      100% { opacity: 1; transform: none; }
    }

    .post-head {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 15px 16px;
      opacity: 0;
      transform: translateY(-8px);
      animation: reveal .36s .12s forwards;
    }

    .avatar {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,.14);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .profile { min-width: 0; flex: 1; }
    .name { font-weight: 900; font-size: 14px; }
    .meta { margin-top: 2px; color: var(--muted); font-size: 12px; }
    .more { color: var(--muted); letter-spacing: .12em; font-weight: 900; }

    .media {
      position: relative;
      overflow: hidden;
      background: #0d0f14;
    }

    .media.ratio-square { aspect-ratio: 1 / 1; }
    .media.ratio-portrait { aspect-ratio: 4 / 5; }
    .media.ratio-landscape { aspect-ratio: 16 / 10; }
    .media.ratio-auto { min-height: 220px; }

    .media img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transform: scale(1.055);
      filter: blur(16px) saturate(.75);
      animation: imageReveal .75s .24s cubic-bezier(.2,.8,.2,1) forwards;
    }

    .media.ratio-auto img { height: auto; }

    @keyframes imageReveal {
      to { opacity: 1; transform: scale(1); filter: blur(0) saturate(1); }
    }

    .scan {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,.25), transparent);
      transform: translateY(-115%);
      animation: scan .78s .2s ease-out forwards;
    }

    @keyframes scan {
      0% { opacity: 0; transform: translateY(-115%); }
      28% { opacity: .7; }
      100% { opacity: 0; transform: translateY(115%); }
    }

    .badge {
      position: absolute;
      z-index: 4;
      top: 14px;
      left: 14px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      color: white;
      background: rgba(9,11,15,.68);
      backdrop-filter: blur(10px);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      opacity: 0;
      transform: translateY(-8px);
      animation: badgeIn .35s .58s forwards, badgeOut .35s 2.5s forwards;
    }

    @keyframes badgeIn { to { opacity: 1; transform: translateY(0); } }
    @keyframes badgeOut { to { opacity: 0; transform: translateY(-8px); } }

    .body {
      padding: 14px 16px 17px;
      opacity: 0;
      transform: translateY(10px);
      animation: reveal .4s .72s forwards;
    }

    @keyframes reveal { to { opacity: 1; transform: translateY(0); } }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .action {
      width: 35px;
      height: 35px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 50%;
      color: white;
      background: transparent;
      font-size: 21px;
      cursor: pointer;
      transition: transform .15s, background .15s, color .15s;
    }

    .action:hover { transform: scale(1.08); background: rgba(255,255,255,.07); }
    .action.like.active { color: #ff4f79; animation: heartPop .38s cubic-bezier(.2,1.5,.4,1); }
    .action.save { margin-left: auto; }
    .action.save.active { color: #ffd66e; }

    @keyframes heartPop { 50% { transform: scale(1.48) rotate(-8deg); } }

    .likes { font-weight: 900; font-size: 14px; }
    .caption { margin-top: 8px; font-size: 14px; line-height: 1.55; }
    .caption b { margin-right: 6px; }
    .comments { margin-top: 10px; display: grid; gap: 7px; }
    .comment {
      font-size: 13px;
      color: #d9dde5;
      opacity: 0;
      transform: translateY(8px);
      animation: commentIn .35s forwards;
    }
    .comment b { color: white; margin-right: 7px; }
    @keyframes commentIn { to { opacity: 1; transform: translateY(0); } }

    .time { margin-top: 12px; color: #747d8b; font-size: 11px; }

    .heart {
      position: fixed;
      z-index: 100;
      pointer-events: none;
      font-size: 28px;
      animation: floatHeart .82s ease-out forwards;
    }

    @keyframes floatHeart {
      0% { opacity: 0; transform: translate(-50%, -20%) scale(.45); }
      24% { opacity: 1; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--x)), -150px) scale(1.25) rotate(var(--r)); }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 110;
      transform: translate(-50%, 18px);
      padding: 11px 15px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: white;
      background: rgba(25,29,37,.96);
      box-shadow: 0 12px 35px rgba(0,0,0,.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s, transform .22s;
      font-size: 13px;
      font-weight: 800;
    }

    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    @media (max-width: 520px) {
      .page { width: 100%; padding: 0; }
      .board { border-radius: 0; border-left: 0; border-right: 0; }
      .feed { padding-inline: 8px; }
      .post { border-radius: 18px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="board">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">F</span>
          <span id="boardTitle">방셀 게시판</span>
        </div>
        <div class="board-status" id="boardStatus">게시물 불러오는 중</div>
      </header>

      <div class="feed" id="feed">
        <div class="loading" id="loading">
          <div>
            <div class="loading-orb"></div>
            <strong>게시물을 불러오고 있습니다</strong>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const feed = document.getElementById('feed');
    const boardTitle = document.getElementById('boardTitle');
    const boardStatus = document.getElementById('boardStatus');
    const toast = document.getElementById('toast');

    let toastTimer;

    loadBoard();

    async function loadBoard() {
      try {
        const response = await fetch(`posts.json?v=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();

        boardTitle.textContent = data.boardTitle || '방셀 게시판';
        document.title = data.boardTitle || '방셀 게시판';

        const posts = Array.isArray(data.posts) ? data.posts : [];
        feed.innerHTML = '';

        if (!posts.length) {
          feed.innerHTML = `
            <div class="empty">
              <div>
                <strong>아직 등록된 게시물이 없습니다</strong>
                <p>관리자가 GitHub에 이미지를 등록하면 여기에 표시됩니다.</p>
              </div>
            </div>`;
          boardStatus.textContent = '게시물 0개';
          return;
        }

        boardStatus.textContent = `게시물 ${posts.length}개`;

        posts.forEach((post, index) => {
          const card = createPost(post, index);
          feed.appendChild(card);
        });
      } catch (error) {
        console.error(error);
        feed.innerHTML = `
          <div class="error">
            <div>
              <strong>게시물을 불러오지 못했습니다</strong>
              <p><code>posts.json</code> 파일 경로와 JSON 문법을 확인해주세요.</p>
            </div>
          </div>`;
        boardStatus.textContent = '불러오기 실패';
      }
    }

    function createPost(post, index) {
      const article = document.createElement('article');
      article.className = 'post enter';
      article.style.animationDelay = `${Math.min(index * 110, 550)}ms`;

      const ratio = ['square','portrait','landscape','auto'].includes(post.ratio)
        ? post.ratio : 'portrait';

      const name = escapeHtml(post.name || '익명');
      const userId = escapeHtml(post.userId || '@guest');
      const caption = escapeHtml(post.caption || '');
      const date = escapeHtml(post.date || '방금 전');
      const image = encodeURI(post.image || '');
      const avatar = encodeURI(post.avatar || post.image || '');
      const likes = Number.isFinite(Number(post.likes)) ? Number(post.likes) : 0;
      const comments = Array.isArray(post.comments) ? post.comments : [];

      article.innerHTML = `
        <div class="post-head">
          <img class="avatar" src="${avatar}" alt="${name} 프로필" />
          <div class="profile">
            <div class="name">${name}</div>
            <div class="meta">${userId} · ${date}</div>
          </div>
          <div class="more">•••</div>
        </div>

        <div class="media ratio-${ratio}">
          ${post.isNew === false ? '' : '<div class="badge">NEW POST</div>'}
          <img src="${image}" alt="${caption || '게시 이미지'}" loading="${index === 0 ? 'eager' : 'lazy'}" />
          <div class="scan"></div>
        </div>

        <div class="body">
          <div class="actions">
            <button class="action like" aria-label="좋아요">♡</button>
            <button class="action" aria-label="댓글">○</button>
            <button class="action share" aria-label="공유">⌁</button>
            <button class="action save" aria-label="저장">⌑</button>
          </div>
          <div class="likes">좋아요 <span>${likes}</span>개</div>
          ${caption ? `<div class="caption"><b>${name}</b>${caption}</div>` : ''}
          <div class="comments"></div>
          <div class="time">${date}</div>
        </div>
      `;

      const img = article.querySelector('.media img');
      img.addEventListener('error', () => {
        img.alt = '이미지를 불러오지 못했습니다';
        img.style.minHeight = '260px';
        img.style.background = 'linear-gradient(145deg, rgba(124,92,255,.12), rgba(255,79,139,.08))';
      });

      const likeButton = article.querySelector('.like');
      const likeCount = article.querySelector('.likes span');
      let liked = false;

      likeButton.addEventListener('click', event => {
        liked = !liked;
        likeButton.classList.toggle('active', liked);
        likeButton.textContent = liked ? '♥' : '♡';
        likeCount.textContent = Number(likeCount.textContent) + (liked ? 1 : -1);
        if (liked) makeHeartBurst(event.clientX, event.clientY);
      });

      img.addEventListener('dblclick', event => {
        if (!liked) likeButton.click();
        makeHeartBurst(event.clientX, event.clientY);
      });

      const saveButton = article.querySelector('.save');
      saveButton.addEventListener('click', () => {
        saveButton.classList.toggle('active');
        saveButton.textContent = saveButton.classList.contains('active') ? '▣' : '⌑';
        showToast(saveButton.classList.contains('active') ? '게시물을 저장했습니다.' : '저장을 취소했습니다.');
      });

      article.querySelector('.share').addEventListener('click', async () => {
        try {
          const shareData = { title: name, text: caption, url: location.href };
          if (navigator.share) await navigator.share(shareData);
          else {
            await navigator.clipboard.writeText(location.href);
            showToast('게시판 주소를 복사했습니다.');
          }
        } catch (_) {}
      });

      const commentBox = article.querySelector('.comments');
      comments.forEach((comment, i) => {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'comment';
          el.innerHTML = `<b>${escapeHtml(comment.user || 'guest')}</b>${escapeHtml(comment.text || '')}`;
          commentBox.appendChild(el);
        }, 1050 + i * 500 + index * 120);
      });

      return article;
    }

    function makeHeartBurst(x, y) {
      const glyphs = ['♥','♡','❤'];
      for (let i = 0; i < 7; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.textContent = glyphs[i % glyphs.length];
        heart.style.left = x + 'px';
        heart.style.top = y + 'px';
        heart.style.setProperty('--x', `${Math.random() * 130 - 65}px`);
        heart.style.setProperty('--r', `${Math.random() * 50 - 25}deg`);
        heart.style.animationDelay = `${i * 35}ms`;
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1000);
      }
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      })[char]);
    }
  </script>
</body>
</html>
